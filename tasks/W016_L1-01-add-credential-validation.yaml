apiVersion: zen.kube-zen.com/v1alpha1
kind: BrainTask
metadata:
  name: w016-l1-01-add-credential-validation
  namespace: zen-brain
spec:
  workItemID: "W016-L1-01"
  title: "Add IsValid() method to JiraMaterial for credential validation"
  description: |
    Add a validation method IsValid() bool to the JiraMaterial struct in internal/secrets/jira.go.
    The method should check:
    - BaseURL is not empty
    - Email contains "@" character
    - APIToken is not empty and has minimum length (10 chars)
    - ProjectKey is not empty
  workType: "implementation"
  workDomain: "core"
  priority: "high"
  queueName: "default"
  constraints:
    - "target_file: internal/secrets/jira.go"
    - "package: secrets"
    - "allowed_imports: fmt,strings"
    - "forbid_new_types: true"
    - "max_context_chars: 2000"
  evidenceRequirement: "test_results"
  timeoutSeconds: 600
  maxRetries: 2
  sessionID: "session-w016-l1-01"
  sourceKey: "W016-L1-01"
  acceptanceCriteria:
    - "IsValid() method added to JiraMaterial struct"
    - "BaseURL is not empty check"
    - "Email contains '@' character check"
    - "APIToken has minimum length (10 chars) check"
    - "ProjectKey is not empty check"
    - "go build ./internal/secrets/ passes"
    - "go test ./internal/secrets/ passes"
  objective: "Demonstrate L1 (0.8B workhorse) execution on bounded single-file task"
