controller:
  replicaCount: 1
  leaderElection:
    mode: builtin

webhook:
  enabled: true
  replicaCount: 1
  tls:
    mode: self-signed  # Automatic certificate generation via Helm hook
  certManager:
    enabled: false
  selfSigned:
    duration: "365d"
    caDuration: "87600h"  # 10 years

# Namespace configuration for zen-lock
# Namespace ownership rule:
# either bootstrap pre-creates this namespace OR Helm creates it.
# Do not do both.
namespace:
  name: zen-lock-system
  create: false

# Secret configuration
# Disable placeholder secret creation - bootstrap creates the real secret
createPlaceholder: false
