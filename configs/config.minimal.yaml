# Zen-Brain 1.0 minimal local config
# Goal: make the CLI useful locally before enabling real external systems.
# Copy to ~/.zen-brain/config.yaml or set ZEN_BRAIN_HOME.

home_dir: "~/.zen-brain"

logging:
  level: "info"
  format: "text"
  output: "stdout"

kb:
  enabled: false
  docs_repo: ""
  search_limit: 10
  required: false

qmd:
  binary_path: ""
  refresh_interval: 3600

jira:
  enabled: false
  base_url: ""
  email: ""
  api_token: ""
  project_key: "ZEN"
  # Canonical secret sources
  credentials_dir: "/zen-lock/secrets"  # ZenLock mounted directory
  credentials_file: "~/.zen-brain/secrets/jira.yaml"  # Host credential file
  allow_env_fallback: false  # Env vars only allowed if explicitly enabled or ZEN_BRAIN_ALLOW_ENV_SECRETS=1
  status_mapping:
    "To Do": "requested"
    "In Progress": "running"
    "Done": "completed"

sred:
  enabled: false
  default_tags:
    - "experimental_general"
  evidence_requirement: "summary"

ledger:
  enabled: false
  required: false

zen_context:
  required: false
  cluster_id: "default"
  verbose: false

message_bus:
  enabled: false
  kind: "redis"
  stream: "zen-brain.events"
  required: false

planner:
  default_model: "glm-4.7"
  max_cost_per_task: 10.0
  require_approval: false
