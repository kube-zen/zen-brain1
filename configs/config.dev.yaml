# Zen-Brain 1.0 development configuration
# This file is a template for local development.

# Home directory (overrides ZEN_BRAIN_HOME)
home_dir: "~/.zen-brain"

# Logging
logging:
  level: "debug"
  format: "json"
  output: "stdout"

# Knowledge Base settings
kb:
  # Path to the zen-docs repository
  docs_repo: "../zen-docs"
  # Default search limit
  search_limit: 10

# QMD settings
qmd:
  # Path to qmd binary (if not in PATH)
  binary_path: "qmd"
  # Index refresh interval (seconds)
  refresh_interval: 3600

# Confluence publishing (optional)
confluence:
  enabled: false
  base_url: "https://your-domain.atlassian.net/wiki"
  space: "ZB"
  # Authentication via environment variables:
  # CONFLUENCE_USERNAME, CONFLUENCE_API_TOKEN

# Jira connector (placeholder)
jira:
  enabled: false
  base_url: "https://your-domain.atlassian.net"
  project: "ZEN"
  # Authentication via environment variables:
  # JIRA_USERNAME, JIRA_API_TOKEN

# Multi-cluster
clusters:
  - id: "cluster-1"
    type: "k3d"
    kubeconfig: "~/.kube/config"
  - id: "cluster-2"
    type: "k3d"
    kubeconfig: "~/.kube/config2"

# SR&ED evidence collection
sred:
  enabled: true
  default_tags:
    - "experimental_general"
  evidence_requirement: "summary"

# ZenLedger (CockroachDB) settings
ledger:
  enabled: false
  # CockroachDB connection details (set via env vars in production)
  host: "localhost"
  port: 26257
  database: "zenledger"
  user: "zen"
  ssl_mode: "disable"

# ZenContext settings (three-tier memory)
zen_context:
  # Tier 1: Hot storage (Redis)
  tier1_redis:
    addr: "localhost:6379"
    password: ""
    db: 0
    pool_size: 10
    min_idle_conns: 5
    dial_timeout: 5s
    read_timeout: 3s
    write_timeout: 3s

  # Tier 2: Warm storage (QMD knowledge base)
  tier2_qmd:
    repo_path: "../zen-docs"
    qmd_binary_path: "qmd"
    verbose: false

  # Tier 3: Cold storage (S3 archival) - MinIO local emulator
  tier3_s3:
    bucket: "zen-brain-context"
    region: "us-east-1"
    endpoint: "http://localhost:9000"  # MinIO local emulator
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin"
    session_token: ""
    use_path_style: true  # Required for MinIO
    disable_ssl: true     # No SSL for local emulator
    force_rename_bucket: false
    max_retries: 3
    timeout: 30s
    part_size: 5242880  # 5 MB
    concurrency: 5
    verbose: false

  # Journal integration (optional)
  journal:
    journal_path: "./journal.db"
    enable_query_index: true

  # General settings
  cluster_id: "default"
  verbose: false

# Planner settings
planner:
  default_model: "glm-4.7"
  max_cost_per_task: 10.0
  require_approval: false