# Zen-Brain 1.0 Minimal Configuration Example
# This is a minimal config for local development and testing
# NOTE: Production requires explicit environment variables for Redis/S3/llama.cpp.
# Missing configuration will FAIL CLOSED (no localhost defaults).

# Home directory (overrides ZEN_BRAIN_HOME)
home_dir: "~/.zen-brain"

# Logging
logging:
  level: "info"  # debug, info, warn, error
  format: "json"  # json or text
  output: "stdout"  # stdout or file path

# Knowledge Base settings
kb:
  docs_repo: "../zen-docs"
  search_limit: 10
  # required: false  # If true, missing docs_repo or qmd binary will fail closed

# QMD settings (knowledge retrieval)
qmd:
  binary_path: "qmd"
  refresh_interval: 3600  # 1 hour in seconds

# Ledger settings (optional - for token/cost accounting)
# ledger:
#   enabled: false
#   required: false
#   host: "localhost"
#   port: 26257
#   database: "defaultdb"
#   user: "root"
#   ssl_mode: "disable"

# Message Bus settings (optional - for event streaming)
# message_bus:
#   enabled: false
#   required: false
#   redis_url: "redis://localhost:6379"
#   stream: "zen-brain.events"

# Jira connector (optional - for real Jira integration)
jira:
  enabled: false  # Set to true for real Jira
  base_url: "https://your-domain.atlassian.net"
  email: "zen-brain@automation.local"
  api_token: ""  # Use canonical source (credentials_dir)
  project_key: "ZB"
  # Canonical secret source (ONLY source in production/cluster mode)
  credentials_dir: "/zen-lock/secrets"  # ZenLock mounted directory
  # DEPRECATED: credentials_file is for local debugging only
  # Do NOT use in cluster mode or production
  # credentials_file: "~/.zen-brain/secrets/jira.yaml"
  # Env fallback is disabled by default (security)
  allow_env_fallback: false  # Env vars only allowed if explicitly enabled or ZEN_BRAIN_ALLOW_ENV_SECRETS=1
  # Field mappings (optional)
  field_mappings: {}  # Not yet used
  status_mapping:
    "To Do": "requested"
    "In Progress": "running"
    "Done": "completed"
    "Blocked": "blocked"
  worktype_mapping:
    "Bug": "debug"
    "Task": "implementation"
    "Story": "design"
    "Epic": "research"
  priority_mapping:
    "Highest": "critical"
    "High": "high"
    "Medium": "medium"
    "Low": "low"
    "Lowest": "background"
  custom_field_mapping: {}  # Map customfield_XXXXX to canonical field
  webhook_url: "https://your-zen-brain.example.com/webhook"
  webhook_secret: "${JIRA_WEBHOOK_SECRET}"
  webhook_port: 8080
  webhook_path: "/webhook"

# ZenContext settings (three-tier memory)
# For minimal setup, ZenContext uses mock in-memory implementation
# Comment out these sections if using mock ZenContext

# Tier 1: Hot storage (Redis)
# tier1_redis:
#   addr: "localhost:6379"
#   password: ""
#   db: 0

# Tier 3: Cold storage (S3 archival)
# tier3_s3:
#   bucket: "zen-brain-context"
#   region: "us-east-1"
#   endpoint: ""  # Set to "http://localhost:9000" for MinIO

# Planner settings
planner:
  default_model: "glm-4.7"  # Model for analysis and planning
  max_cost_per_task: 10.0   # Maximum cost per task in dollars
  require_approval: false  # Require manual approval for high-cost tasks

# SR&ED evidence collection
sred:
  enabled: false  # Enable for production SR&ED tracking
  default_tags:
    - "experimental_general"
  evidence_requirement: "summary"
