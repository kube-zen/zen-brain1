apiVersion: v1
kind: Namespace
metadata:
  name: zen-lock-system
  labels:
    name: zen-lock
    part-of: zen-brain
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zen-lock-controller
  namespace: zen-lock-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zen-lock-controller
  namespace: zen-lock-system
  labels:
    app.kubernetes.io/name: zen-lock-controller
    app.kubernetes.io/part-of: zen-lock
rules:
  - apiGroups: ["security.kube-zen.io"]
    resources: ["zenlocks", "zenlocks/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zen-lock-controller
  namespace: zen-lock-system
  labels:
    app.kubernetes.io/name: zen-lock-controller
    app.kubernetes.io/part-of: zen-lock
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: zen-lock-controller
subjects:
  - kind: ServiceAccount
    name: zen-lock-controller
    namespace: zen-lock-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zen-lock-controller
  namespace: zen-lock-system
  labels:
    app.kubernetes.io/name: zen-lock-controller
    app.kubernetes.io/part-of: zen-lock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zen-lock-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zen-lock-controller
        app.kubernetes.io/part-of: zen-lock
    spec:
      serviceAccountName: zen-lock-controller
      containers:
      - name: manager
        image: zen-lock/zen-lock:v0.0.3-alpha
        imagePullPolicy: IfNotPresent
        args:
          - --zap-level=info
          - --zap-encoder=json
          - --metrics-bind-address=:8080
          - --leader-election
          - --health-probe-bind-address=:8081
          - --controller-runtime
        env:
          - name: ZEN_LOCK_WEBHOOK_TIMEOUT
            value: "30s"
          - name: ZEN_LOCK_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: key.txt
          - name: ZEN_LOCK_CACHE_TTL
            value: "24h"
          - name: ZEN_LOCK_ORPHAN_TTL
            value: "24h"
        volumeMounts:
          - name: zen-lock-secrets
            mountPath: /var/run/zen-lock
            readOnly: true
        ports:
          - name: webhook
            containerPort: 9443
          - name: metrics
            containerPort: 8080
          - name: health
            containerPort: 8081
---
apiVersion: v1
kind: Deployment
metadata:
  name: zen-lock-webhook
  namespace: zen-lock-system
  labels:
    app.kubernetes.io/name: zen-lock-webhook
    app.kubernetes.io/part-of: zen-lock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zen-lock-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zen-lock-webhook
        app.kubernetes.io/part-of: zen-lock
    spec:
      serviceAccountName: zen-lock-webhook
      containers:
      - name: webhook
        image: zen-lock/zen-lock:v0.0.3-alpha
        imagePullPolicy: IfNotPresent
        args:
          - --webhook-only
          - --webhook-tls-cert-dir=/var/run/webhook/certs
          - --webhook-tls-host=0.0.0.0
          - --zap-level=info
          - --zap-encoder=json
          - --metrics-bind-address=:8080
        env:
          - name: ZEN_LOCK_WEBHOOK_TIMEOUT
            value: "30s"
        ports:
          - name: webhook
            containerPort: 9443
          - name: metrics
            containerPort: 8080
          - name: health
            containerPort: 8081
