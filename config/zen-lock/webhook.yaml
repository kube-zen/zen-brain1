apiVersion: v1
kind: Deployment
metadata:
  name: zen-lock-webhook
  namespace: zen-lock-system
  labels:
    app.kubernetes.io/name: zen-lock-webhook
    app.kubernetes.io/part-of: zen-lock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zen-lock-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zen-lock-webhook
        app.kubernetes.io/part-of: zen-lock
    spec:
      serviceAccountName: zen-lock-webhook
      containers:
      - name: webhook
        image: zen-lock/zen-lock:v0.0.3-alpha
        imagePullPolicy: IfNotPresent
        args:
          - --zap-level=info
          - --webhook-only
          - --tls-host=0.0.0.0
          - --webhook-tls-cert-dir=/var/run/webhook/certs
          - --webhook-tls-host=0.0.0.0
          - --webhook-tls-port=9443
        ports:
          - name: webhook
            containerPort: 9443
          - name: metrics
            containerPort: 8080
          - name: health
            containerPort: 8081
        env:
          - name: ZEN_LOCK_WEBHOOK_TIMEOUT
            value: "30s"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zen-lock-webhook
  namespace: zen-lock-system
  labels:
    app.kubernetes.io/name: zen-lock-webhook
    app.kubernetes.io/part-of: zen-lock
spec:
  selector:
    app.kubernetes.io/name: zen-lock-webhook
  ports:
    - name: webhook
      port: 9443
      targetPort: webhook
    - name: metrics
      port: 8080
      targetPort: metrics
    - name: health
      port: 8081
      targetPort: health
