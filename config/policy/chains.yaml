# Chain Policy Configuration for zen-brain1
# Version: 1.0
# Status: Production
#
# IMPORTANT: Local CPU Inference Policy (ZB-023)
# ================================================
# UNTIL EXPLICITLY OVERRIDDEN BY THE OPERATOR:
# - qwen3.5:0.8b is the local model via llama.cpp (L1 endpoint)
# - llama.cpp (L1/L2) is the ONLY supported local CPU inference path
# - Ollama is FORBIDDEN for zen-brain1

chains:
  - name: bounded-execution-chain
    description: "Execute a bounded task with local worker"
    tasks:
      - name: execute
        task_class: bounded-execution
        role: worker
        timeout_seconds: 2700  # ZB-024: 45 minutes for qwen3.5:0.8b normal lane

  - name: planning-and-execution-chain
    description: "Plan and then execute a complex task"
    tasks:
      - name: plan
        task_class: complex-planning
        role: planner
        timeout_seconds: 2700  # ZB-024: 45 minutes for qwen3.5:0.8b normal lane
      - name: execute
        task_class: bounded-execution
        role: worker
        depends_on:
          - plan
        timeout_seconds: 2700  # ZB-024: 45 minutes for qwen3.5:0.8b normal lane

  - name: code-review-chain
    description: "Review code for correctness and best practices"
    tasks:
      - name: review
        task_class: review
        role: reviewer
        timeout_seconds: 2700  # ZB-024: 45 minutes for qwen3.5:0.8b normal lane

  - name: documentation-chain
    description: "Create or update documentation"
    tasks:
      - name: write-docs
        task_class: documentation
        role: summarizer
        timeout_seconds: 2700  # ZB-024: 45 minutes for qwen3.5:0.8b normal lane

  - name: debug-and-fix-chain
    description: "Diagnose issue and propose fix"
    tasks:
      - name: diagnose
        task_class: analysis
        role: debugger
        timeout_seconds: 2700  # ZB-024: 45 minutes normal timeout (may use cloud)
      - name: propose-fix
        task_class: bounded-execution
        role: worker
        depends_on:
          - diagnose
        timeout_seconds: 2700  # ZB-024: 45 minutes for qwen3.5:0.8b normal lane
