# providers.yaml - Defines available AI providers and their capabilities
# Providers can be managed (service keys) or BYOK (Bring Your Own Key)

providers:
  # DeepSeek - Most cost-effective, Chinese model
  - name: deepseek
    display_name: "DeepSeek Chat"
    class: language-model
    enabled: true
    provider_type: managed|byok  # Can accept both managed and customer keys
    api_endpoint: https://api.deepseek.com
    models:
      - name: deepseek-chat
        display_name: "DeepSeek V2.5"
        class: chat
        context_window: 128000
        max_output_tokens: 4000
        cost_per_1m_input_tokens: 0.14  # $0.14/1M tokens
        cost_per_1m_output_tokens: 0.28
        supports_streaming: false
        supports_functions: true
        supports_json_mode: true
        max_batch_size: 1
        rate_limit_rpm: 60
        rate_limit_rpd: 100000
        recommended_for_tasks:
          - analyze-security-event
          - threat-intelligence
          - generate-security-docs
          - synthesize-knowledge
          - coordinate-task-execution
      - name: deepseek-reasoner
        display_name: "DeepSeek V2.5 (Reasoning)"
        class: reasoning
        context_window: 64000
        max_output_tokens: 8000
        cost_per_1m_input_tokens: 0.14
        cost_per_1m_output_tokens: 0.28
        supports_streaming: false
        supports_functions: true
        supports_json_mode: true
        max_batch_size: 1
        recommended_for_tasks:
          - correlate-events
          - arbitrate-providers

  # OpenAI - GPT-4 series
  - name: openai
    display_name: "OpenAI"
    class: language-model
    enabled: true
    provider_type: managed|byok
    api_endpoint: https://api.openai.com/v1
    models:
      - name: gpt-4o-mini
        display_name: "GPT-4o Mini"
        class: chat
        context_window: 128000
        max_output_tokens: 16384
        cost_per_1m_input_tokens: 0.15  # $0.15/1M tokens (input)
        cost_per_1m_output_tokens: 0.60  # $0.60/1M tokens (output)
        supports_streaming: true
        supports_functions: true
        supports_json_mode: true
        max_batch_size: 1
        rate_limit_rpm: 500
        rate_limit_rpd: 100000
        recommended_for_tasks:
          - code-security-review
          - vulnerability-scan
          - arbitrate-providers
          - coordinate-task-execution
      - name: gpt-4o
        display_name: "GPT-4o"
        class: chat
        context_window: 128000
        max_output_tokens: 4096
        cost_per_1m_input_tokens: 2.50
        cost_per_1m_output_tokens: 10.00
        supports_streaming: true
        supports_functions: true
        supports_json_mode: true
        max_batch_size: 1
        rate_limit_rpm: 500
        rate_limit_rpd: 100000
        recommended_for_tasks:
          - code-security-review
          - vulnerability-scan
      - name: text-embedding-ada-002
        display_name: "Text Embedding Ada 002"
        class: embedding
        context_window: 8192
        max_output_tokens: 1536
        cost_per_1m_input_tokens: 0.10
        cost_per_1m_output_tokens: 0.00  # No output tokens for embeddings
        embedding_dimension: 1536
        supports_streaming: false
        supports_functions: false
        supports_json_mode: false
        max_batch_size: 2048
        rate_limit_rpm: 3000
        rate_limit_rpd: 3000000
        recommended_for_tasks:
          - semantic-cache  # Special task for embedding generation

  # Anthropic - Claude series
  - name: anthropic
    display_name: "Anthropic (Claude)"
    class: language-model
    enabled: true
    provider_type: managed|byok
    api_endpoint: https://api.anthropic.com/v1
    models:
      - name: claude-3-haiku
        display_name: "Claude 3 Haiku"
        class: chat
        context_window: 200000
        max_output_tokens: 4096
        cost_per_1m_input_tokens: 0.25  # $0.25/1M tokens (input)
        cost_per_1m_output_tokens: 1.25  # $1.25/1M tokens (output)
        supports_streaming: true
        supports_functions: true
        supports_json_mode: false  # Claude requires explicit JSON response instructions
        max_batch_size: 1
        rate_limit_rpm: 60
        rate_limit_rpd: 50000
        recommended_for_tasks:
          - code-security-review
          - create-incident-runbook
          - generate-security-docs
      - name: claude-3-sonnet
        display_name: "Claude 3 Sonnet"
        class: chat
        context_window: 200000
        max_output_tokens: 8192
        cost_per_1m_input_tokens: 3.00
        cost_per_1m_output_tokens: 15.00
        supports_streaming: true
        supports_functions: true
        supports_json_mode: false
        max_batch_size: 1
        rate_limit_rpm: 60
        rate_limit_rpd: 50000
        recommended_for_tasks:
          - code-security-review
          - correlate-events
          - create-incident-runbook
          - generate-security-docs
      - name: claude-3-opus
        display_name: "Claude 3 Opus"
        class: chat
        context_window: 200000
        max_output_tokens: 4096
        cost_per_1m_input_tokens: 15.00
        cost_per_1m_output_tokens: 75.00
        supports_streaming: true
        supports_functions: true
        supports_json_mode: false
        max_batch_size: 1
        rate_limit_rpm: 60
        rate_limit_rpd: 50000
        recommended_for_tasks:
          - code-security-review

# Provider fallback chain order (used when preferred provider fails)
fallback_chain:
  - deepseek
  - openai
  - anthropic

# Provider-level constraints
provider_constraints:
  max_concurrent_requests: 50
  max_request_timeout_seconds: 120
  retry_policy:
    max_attempts: 3
    initial_backoff_ms: 1000
    max_backoff_ms: 10000
    backoff_multiplier: 2.0
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout_seconds: 60
    half_open_requests: 3
