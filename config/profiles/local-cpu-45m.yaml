# Local CPU Inference Profile - 45m Timeout (ZB-024)
#
# This profile configures zen-brain1 for CPU-only local inference with long timeouts.
# It is the runtime representation of ZB-023 policy enforcement.
#
# HARD TRUTHS:
# - qwen3.5:0.8b is the ONLY allowed local model
# - Host Docker Ollama is the ONLY supported local inference path
# - In-cluster Ollama is FORBIDDEN for active local path
# - thinking=false for local CPU path (unless explicitly overridden)
# - Long timeouts (45m) are NORMAL and REQUIRED for CPU inference
#
# This profile MUST be used for all CPU-only local inference environments.

name: local-cpu-45m
description: "CPU-only local inference profile with 45-minute timeout"

# Local Worker Configuration (qwen3.5:0.8b via host Docker Ollama)
local_worker:
  model: qwen3.5:0.8b
  base_url: http://host.k3d.internal:11434  # Host Docker Ollama ONLY
  timeout_seconds: 2700  # 45 minutes - LONG TIMEOUT IS NORMAL FOR CPU
  keep_alive: 45m        # Keep model resident for 45 minutes
  supports_tools: true
  max_cost: 0.01        # $0.01 max per task (essentially free)
  enable_thinking: false  # CPU path defaults to no thinking

# Planner Configuration (cloud models for complex tasks)
planner:
  model: glm-4.7  # Default cloud planner
  timeout_seconds: 2700  # 45 minutes
  supports_tools: true
  min_cost: 0.10        # $0.10 minimum per task

# Fallback Configuration
fallback:
  model: glm-4.7  # Fallback to cloud
  enable_chain: true
  strict_preferred: false  # Allow intelligent fallback

# Routing Policy
routing:
  policy: simple  # Simple cost-aware routing
  auto_escalate_complex_tasks: true

# Foreman Factory Configuration (ZB-022)
factory:
  enable_llm: true
  llm_base_url: http://host.k3d.internal:11434
  llm_model: qwen3.5:0.8b
  llm_timeout_seconds: 2700  # 45 minutes
  llm_enable_thinking: false  # CPU path defaults to no thinking

# Stale Detection Threshold
# IMPORTANT: Stale threshold MUST be > execution timeout (45m) to avoid racing valid long-running tasks
stale_detection:
  threshold_minutes: 50  # 50 minutes - > 45m execution timeout
  requeue_interval: 1m

# Retry Configuration
retry:
  enabled: true
  max_attempts: 3
  backoff_base: 30s  # 30 seconds initial backoff
  backoff_max: 5m   # 5 minutes max backoff
  jitter: true

# Escalation Configuration
escalation:
  enabled: true
  max_tasks: 3  # Max 3 tasks to escalate before giving up
  timeout_multiplier: 1.5  # Use 1.5x execution timeout for escalation

# Queue Configuration
queue:
  max_depth: 100  # Max 100 tasks in queue
  batch_size: 10
