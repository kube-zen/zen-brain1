# Night shift schedule - runs during off-peak hours
name: "nightshift"
description: "Execute maintenance and improvement tasks during night hours"
type: "recurring"
interval: "6h"

time_window:
  start_hour: 23  # 11 PM
  end_hour: 6     # 6 AM
  timezone: "America/Toronto"

retry_policy:
  max_retries: 2
  backoff: "30m"
  catch_up: true  # Run missed tasks after outage

task_template: "nightshift-maintenance"
enabled: true
