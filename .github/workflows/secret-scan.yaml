# Secret Scanning Workflow
# Part of ZB-013 security hardening
# Scans for leaked credentials on push and PR

name: Secret Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  secret-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better detection
      
      - name: Scan for Jira tokens
        run: |
          echo "Scanning for Jira API tokens..."
          if git diff --name-only ${{ github.event.before || 'HEAD~1' }}..HEAD 2>/dev/null | \
             xargs grep -l 'ATATT3[A-Za-z0-9_-]*' 2>/dev/null; then
            echo "::error::Jira API token detected! Never commit real tokens."
            echo "Use ZenLock for secret management."
            echo "See: deploy/zen-lock/JIRA_INTEGRATION_RUNBOOK.md"
            exit 1
          fi
          echo "✓ No Jira tokens found"
      
      - name: Scan for Atlassian Connect tokens
        run: |
          echo "Scanning for Atlassian Connect tokens..."
          if git diff --name-only ${{ github.event.before || 'HEAD~1' }}..HEAD 2>/dev/null | \
             xargs grep -l "ATCTT3[A-Za-z0-9_-]*" 2>/dev/null; then
            echo "::error::Atlassian Connect token detected!"
            exit 1
          fi
          echo "✓ No Connect tokens found"
      
      - name: Scan for generic secrets
        run: |
          echo "Scanning for generic secret patterns..."
          # Check for common secret patterns in staged files
          patterns=(
            "api_key\s*=\s*['\"][^'\"]+['\"]"
            "secret\s*=\s*['\"][^'\"]+['\"]"
            "token\s*=\s*['\"][^'\"]+['\"]"
            "password\s*=\s*['\"][^'\"]+['\"]"
          )
          
          found=0
          for pattern in "${patterns[@]}"; do
            if grep -rE "$pattern" --include="*.py" --include="*.go" --include="*.yaml" --include="*.yml" \
               --exclude-dir=.git --exclude-dir=vendor . 2>/dev/null | \
               grep -v "REDACTED\|placeholder\|example\|your-"; then
              found=1
            fi
          done
          
          if [ $found -eq 1 ]; then
            echo "::warning::Potential secrets found. Review and ensure they are placeholders."
          else
            echo "✓ No obvious secrets found"
          fi
      
      - name: Verify ZenLock files are encrypted
        run: |
          echo "Verifying ZenLock files are encrypted..."
          for file in $(find . -name "*.zenlock.yaml" -not -path "./.git/*" 2>/dev/null); do
            if grep -q "age-encryption.org/v1" "$file"; then
              echo "✓ $file is encrypted"
            elif grep -q "stringData:\|data:" "$file"; then
              echo "::error::$file appears to contain plaintext data!"
              exit 1
            fi
          done
          echo "✓ All ZenLock files verified"

      - name: Summary
        run: |
          echo "## Secret Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ No leaked credentials detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Remember: Use ZenLock for all secrets. See \`deploy/zen-lock/JIRA_INTEGRATION_RUNBOOK.md\`" >> $GITHUB_STEP_SUMMARY
