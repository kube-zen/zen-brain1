# API server (Block 3.4) in-cluster deployment.
# Serves /healthz, /readyz, /api/v1/sessions, /api/v1/health, /api/v1/version, /api/v1/evidence.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apiserver
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: apiserver
    app.kubernetes.io/part-of: zen-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apiserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apiserver
        app.kubernetes.io/part-of: zen-brain
    spec:
      containers:
        - name: apiserver
          image: zen-registry:5000/zen-brain:dev
          imagePullPolicy: IfNotPresent
          command: ["/app/apiserver"]
          env:
            - name: API_SERVER_PORT
              value: "8080"
            - name: OLLAMA_BASE_URL
              # Default for dev/sandbox: host Docker Ollama (http://host.k3d.internal:11434)
              # In-cluster Ollama (http://ollama:11434) is optional/legacy/experimental
              # See deploy/README.md for Ollama deployment model policy
              value: "http://host.k3d.internal:11434"
            - name: OLLAMA_TIMEOUT_SECONDS
              value: "120"
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
            # Optional: set ZEN_API_KEY (e.g. from a Secret) to enable API key auth.
            # - name: ZEN_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: apiserver-secrets
            #       key: api-key
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: apiserver
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: apiserver
    app.kubernetes.io/part-of: zen-brain
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: apiserver
