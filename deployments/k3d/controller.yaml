# Zen-Brain controller (Block 6) — reconciles ZenProject and ZenCluster CRDs in-cluster.
# Requires CRDs applied: kubectl apply -f deployments/crds/
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zen-brain-controller
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: zen-brain-controller
    app.kubernetes.io/part-of: zen-brain
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zen-brain-controller
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: zen-brain-controller
    app.kubernetes.io/part-of: zen-brain
rules:
  - apiGroups: ["zen.kube-zen.com"]
    resources: ["zenprojects", "zenprojects/status", "zenclusters", "zenclusters/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zen-brain-controller
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: zen-brain-controller
    app.kubernetes.io/part-of: zen-brain
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zen-brain-controller
subjects:
  - kind: ServiceAccount
    name: zen-brain-controller
    namespace: zen-brain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zen-brain-controller
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: zen-brain-controller
    app.kubernetes.io/part-of: zen-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zen-brain-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zen-brain-controller
        app.kubernetes.io/part-of: zen-brain
    spec:
      serviceAccountName: zen-brain-controller
      containers:
        - name: controller
          image: zen-registry:5000/zen-brain:dev
          imagePullPolicy: IfNotPresent
          command: ["/app/controller"]
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: zen-brain-controller
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: zen-brain-controller
    app.kubernetes.io/part-of: zen-brain
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
    - name: health
      port: 8081
      targetPort: 8081
  selector:
    app.kubernetes.io/name: zen-brain-controller
