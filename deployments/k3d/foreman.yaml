# Foreman controller (Block 4.2) in-cluster deployment.
# Requires CRDs applied: kubectl apply -f deployments/crds/
# Optional: ZenContext Redis for ReMe — deploy zencontext-in-cluster and set ZEN_CONTEXT_REDIS_URL.
# NOTE: Image reference `zen-registry:5000` assumes k3d registry port 5000 is accessible.
# Ensure `docker push zen-registry:5000/zen-brain:dev` is possible before deployment updates.
# If rebuild/push is blocked, `imagePullPolicy: IfNotPresent` will fail.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: foreman
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
# NOTE: Image reference `zen-registry:5000` assumes k3d registry port 5000 is accessible.
# Ensure `docker push zen-registry:5000/zen-brain:dev` is possible before deployment updates.
# If rebuild/push is blocked, `imagePullPolicy: IfNotPresent` will fail.

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: foreman
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
rules:
  - apiGroups: ["zen.kube-zen.com"]
    resources: ["braintasks", "braintasks/status", "brainqueues", "brainqueues/status", "brainagents", "brainagents/status", "brainpolicies", "brainpolicies/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
# NOTE: Image reference `zen-registry:5000` assumes k3d registry port 5000 is accessible.
# Ensure `docker push zen-registry:5000/zen-brain:dev` is possible before deployment updates.
# If rebuild/push is blocked, `imagePullPolicy: IfNotPresent` will fail.

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: foreman
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: foreman
subjects:
  - kind: ServiceAccount
    name: foreman
    namespace: zen-brain
# NOTE: Image reference `zen-registry:5000` assumes k3d registry port 5000 is accessible.
# Ensure `docker push zen-registry:5000/zen-brain:dev` is possible before deployment updates.
# If rebuild/push is blocked, `imagePullPolicy: IfNotPresent` will fail.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foreman
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: foreman
  template:
    metadata:
      labels:
        app.kubernetes.io/name: foreman
        app.kubernetes.io/part-of: zen-brain
      # Zen-Lock Jira credentials injection (ZB-017: intended path active)
      annotations:
        zen-lock/inject: "jira-credentials"
        zen-lock/mount-path: "/zen-lock/secrets"
    spec:
      serviceAccountName: foreman
      containers:
        - name: foreman
          image: zen-registry:5000/zen-brain:dev
          imagePullPolicy: Always
          command: ["/app/foreman"]
          args:
            - "-metrics-bind-address=:8080"
            - "-health-probe-bind-address=:8081"
            - "-workers=5"
            - "-factory-enable-llm=true"
            - "-factory-llm-provider=ollama"
            - "-factory-llm-base-url=http://host.k3d.internal:11434"
            - "-factory-llm-model=qwen3.5:0.8b"
            - "-factory-llm-timeout-seconds=2700"
            - "-factory-llm-enable-thinking=false"
          env:
            - name: ZEN_FOREMAN_RUNTIME_DIR
              value: "/tmp/zen-brain-factory"
            - name: ZEN_FOREMAN_WORKSPACE_HOME
              value: "/tmp/zen-brain-factory"
            # Optional: set to redis://zencontext-redis.zen-context.svc.cluster.local:6379 when ZenContext Redis is deployed (zencontext-in-cluster) to enable ReMe.
            # - name: ZEN_CONTEXT_REDIS_URL
            #   value: "redis://zencontext-redis.zen-context.svc.cluster.local:6379"
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /home/zenuser/.zen-brain
      volumes:
        - name: config
          configMap:
            name: foreman-config
# NOTE: Image reference `zen-registry:5000` assumes k3d registry port 5000 is accessible.
# Ensure `docker push zen-registry:5000/zen-brain:dev` is possible before deployment updates.
# If rebuild/push is blocked, `imagePullPolicy: IfNotPresent` will fail.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: foreman-config
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
data:
  config.yaml: |
    jira:
      enabled: true
      allow_env_fallback: false
# NOTE: Image reference `zen-registry:5000` assumes k3d registry port 5000 is accessible.
# Ensure `docker push zen-registry:5000/zen-brain:dev` is possible before deployment updates.
# If rebuild/push is blocked, `imagePullPolicy: IfNotPresent` will fail.

---
apiVersion: v1
kind: Service
metadata:
  name: foreman
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
    - name: health
      port: 8081
      targetPort: 8081
  selector:
    app.kubernetes.io/name: foreman
