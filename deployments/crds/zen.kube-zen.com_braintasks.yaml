---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: braintasks.zen.kube-zen.com
spec:
  group: zen.kube-zen.com
  names:
    kind: BrainTask
    listKind: BrainTaskList
    plural: braintasks
    shortNames:
    - bt
    singular: braintask
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.sessionID
      name: Session
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BrainTask is the Schema for the braintasks API (Block 4.1).
          It represents a single AI task produced by the Office and consumed by the Factory.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BrainTaskSpec defines the desired state of BrainTask.
              Mirrors pkg/contracts.BrainTaskSpec for Office-to-Factory contract.
            properties:
              acceptanceCriteria:
                items:
                  type: string
                type: array
              constraints:
                items:
                  type: string
                type: array
              dependsOn:
                items:
                  type: string
                type: array
              description:
                type: string
              estimatedCostUSD:
                minimum: 0
                type: number
              evidenceRequirement:
                description: EvidenceRequirement and SR&ED fields (canonical with
                  contracts.BrainTaskSpec).
                enum:
                - none
                - summary
                - logs
                - diff
                - test_results
                - full_artifact
                type: string
              hypothesis:
                type: string
              id:
                description: ID is the task identifier (canonical with contracts.BrainTaskSpec).
                type: string
              kbScopes:
                items:
                  type: string
                type: array
              maxRetries:
                minimum: 0
                type: integer
              objective:
                minLength: 1
                type: string
              priority:
                description: Priority represents normalized priority (not Jira-native).
                enum:
                - critical
                - high
                - medium
                - low
                - background
                type: string
              queueName:
                description: QueueName is the name of the BrainQueue to use for scheduling
                  (optional). Foreman skips scheduling if that queue is Paused.
                type: string
              sessionID:
                description: SessionID links this task to a work session.
                minLength: 1
                type: string
              sourceKey:
                description: SourceKey is the external key (e.g. Jira PROJ-123).
                type: string
              sredTags:
                items:
                  description: SREDTag represents SR&ED uncertainty categories.
                  type: string
                type: array
              timeoutSeconds:
                format: int64
                minimum: 0
                type: integer
              title:
                minLength: 1
                type: string
              workDomain:
                description: WorkDomain represents which part of the system this affects.
                enum:
                - office
                - factory
                - sdk
                - policy
                - memory
                - observability
                - infrastructure
                - integration
                - core
                type: string
              workItemID:
                description: WorkItemID is the source work item identifier.
                minLength: 1
                type: string
              workType:
                description: WorkType represents the kind of work.
                enum:
                - research
                - design
                - implementation
                - debug
                - refactor
                - documentation
                - analysis
                - operations
                - security
                - testing
                type: string
            required:
            - objective
            - sessionID
            - title
            - workDomain
            - workItemID
            - workType
            type: object
          status:
            description: BrainTaskStatus defines the observed state of BrainTask.
            properties:
              assignedAgent:
                description: AssignedAgent is the worker/agent handling this task
                  (if any).
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              message:
                description: Message is a human-readable message for the current state.
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: Phase is the current phase of the task.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
