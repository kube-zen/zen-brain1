# Ollama in-cluster (Block 5) — **DEPRECATED (2026-03-26)**
# DO NOT USE. Primary runtime is llama.cpp (L1/L2). Ollama fallback uses host Docker only.
# Original: Ollama in-cluster (Block 5). Optional: enable with deploy.use_ollama in config/clusters.yaml.
# Zen-brain workloads use OLLAMA_BASE_URL=http://ollama:11434 to reach this service.
# Models are stored in the PVC; pull once with e.g. kubectl exec -it deploy/ollama -n zen-brain -- ollama pull qwen3.5:0.8b
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: zen-brain
  labels:
    app: ollama
    app.kubernetes.io/part-of: zen-brain
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: zen-brain
  labels:
    app: ollama
    app.kubernetes.io/part-of: zen-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        app.kubernetes.io/part-of: zen-brain
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: zen-brain
  labels:
    app: ollama
    app.kubernetes.io/part-of: zen-brain
spec:
  ports:
    - name: http
      port: 11434
      targetPort: 11434
  selector:
    app: ollama
