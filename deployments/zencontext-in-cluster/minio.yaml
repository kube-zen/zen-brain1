# MinIO for ZenContext Tier 3 (S3-compatible) in-cluster. Block 4.
apiVersion: v1
kind: Service
metadata:
  name: zencontext-minio
  namespace: zen-context
  labels:
    app: zencontext-minio
spec:
  ports:
    - port: 9000
      targetPort: 9000
      name: api
  selector:
    app: zencontext-minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zencontext-minio
  namespace: zen-context
  labels:
    app: zencontext-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zencontext-minio
  template:
    metadata:
      labels:
        app: zencontext-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
          ports:
            - containerPort: 9000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
