# RBAC for zen-brain control-plane
# Single ServiceAccount: zen-brain (used by scheduler, factory-fill, foreman, and pooled workers)
# ZenLock jira-credentials allowedSubjects must include this SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zen-brain
  namespace: zen-brain
---
# ClusterRole needed because controller-runtime watches CRDs at cluster scope
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zen-brain-control-plane
rules:
# BrainTask CRD and related resources (zen.kube-zen.com group)
- apiGroups: ["zen.kube-zen.com"]
  resources: ["braintasks", "braintasks/status", "brainqueues", "brainqueues/status", "brainagents", "brainagents/status", "brainpolicies", "brainpolicies/status", "zenprojects", "zenprojects/status", "zenclusters", "zenclusters/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# TaskSession CRD (thin session state if needed)
- apiGroups: ["zenbrain.kube-zen.io"]
  resources: ["tasksessions", "tasksessions/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# ConfigMaps (schedules, templates, artifacts)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
# Secrets (ZenLock-injected credentials)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
# Pods (for status introspection)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zen-brain-control-plane
subjects:
- kind: ServiceAccount
  name: zen-brain
  namespace: zen-brain
roleRef:
  kind: ClusterRole
  name: zen-brain-control-plane
  apiGroup: rbac.authorization.k8s.io
