# RBAC for zen-brain control-plane
# Single ServiceAccount: zen-brain (used by scheduler, factory-fill, and pooled workers)
# ZenLock jira-credentials allowedSubjects must include this SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zen-brain
  namespace: zen-brain
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zen-brain-control-plane
  namespace: zen-brain
rules:
# BrainTask CRD (scheduler reads, factory-fill creates/updates)
- apiGroups: ["zen.kube-zen.io"]
  resources: ["braintasks", "braintasks/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# TaskSession CRD (thin session state if needed)
- apiGroups: ["zenbrain.kube-zen.io"]
  resources: ["tasksessions", "tasksessions/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# ConfigMaps (schedules, templates, artifacts)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
# Secrets (ZenLock-injected credentials)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
# Pods (for status introspection)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zen-brain-control-plane
  namespace: zen-brain
subjects:
- kind: ServiceAccount
  name: zen-brain
  namespace: zen-brain
roleRef:
  kind: Role
  name: zen-brain-control-plane
  apiGroup: rbac.authorization.k8s.io
