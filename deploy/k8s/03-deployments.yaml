# ── Scheduler Deployment ─────────────────────────────────────────────
# Runs the recurring scheduler daemon. Invokes useful-batch as subprocess.
# Pooled model: N concurrent goroutines per schedule, not one Job per task.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: zen-brain
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zen-brain
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zen-brain
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: zen-brain
      containers:
      - name: scheduler
        image: zen-registry:5000/zen-brain-scheduler:latest
        imagePullPolicy: Never
        env:
        - name: SCHEDULE_DIR
          value: "/config/schedules"
        - name: STATE_DIR
          value: "/state"
        - name: ARTIFACT_ROOT
          value: "/artifacts"
        - name: BATCH_BIN
          value: /usr/local/bin/useful-batch
        - name: METRICS_DIR
          value: "/metrics"
        - name: L1_ENDPOINT
          value: "http://host.k3d.internal:56227"
        - name: L2_ENDPOINT
          value: "http://host.k3d.internal:60509"
        - name: L1_MODEL
          value: "Qwen3.5-0.8B-Q4_K_M.gguf"
        - name: POLL_INTERVAL
          value: "60s"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        # Jira credentials from ZenLock-decrypted secret
        envFrom:
        - secretRef:
            name: jira-credentials-runtime
        volumeMounts:
        - name: schedules
          mountPath: /config/schedules
          readOnly: true
        - name: task-templates
          mountPath: /config/task-templates
          readOnly: true
        - name: state
          mountPath: /state
        - name: artifacts
          mountPath: /artifacts
        - name: metrics
          mountPath: /metrics
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
      volumes:
      - name: schedules
        configMap:
          name: schedules
      - name: task-templates
        configMap:
          name: task-templates
      - name: state
        emptyDir: {}
      - name: artifacts
        emptyDir: {}
      - name: metrics
        emptyDir: {}
---
# ── Factory-Fill Deployment (Pooled Workers) ─────────────────────────
# Backlog-aware dispatch loop with pooled concurrent workers.
# NOT one Job per task — uses goroutine pool for work-conserving behavior.
# Each goroutine invokes remediation-worker as subprocess.
# Adaptive concurrency (R035–R041): dynamic W based on CPU, backlog, reserved slots.
#
# DEPLOYMENT MODEL (Priority 2+3):
#   - Init container clones the service-owned repo into a persistent volume
#   - Main container has read-write access to the cloned repo
#   - Git push credentials mounted from secret (HTTPS token)
#   - Readiness probe verifies repo + auth before accepting work
#   - Branch-per-ticket model: zb/<jira-key>-<timestamp>
#   - Never direct push to main
apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-fill
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: zen-brain
    app.kubernetes.io/component: factory-fill
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zen-brain
      app.kubernetes.io/component: factory-fill
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zen-brain
        app.kubernetes.io/component: factory-fill
    spec:
      serviceAccountName: zen-brain
      # ── Init Container: Clone service-owned repo ──────────────────
      initContainers:
      - name: clone-repo
        image: zen-registry:5000/zen-brain-factory-fill:latest
        imagePullPolicy: Never
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            REPO_DIR="/workspace/repo"
            BRANCH="main"

            # Read GitHub token from secret
            GITHUB_TOKEN=$(cat /git-auth/github-token)

            echo "[INIT] Cloning repo via HTTPS..."
            HTTPS_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/kube-zen/zen-brain1.git"

            if [ -d "$REPO_DIR/.git" ]; then
                echo "[INIT] Repo exists, fetching latest..."
                cd "$REPO_DIR"
                git fetch origin
                git reset --hard "origin/$BRANCH"
            else
                git clone --branch "$BRANCH" --single-branch "$HTTPS_URL" "$REPO_DIR"
            fi

            echo "[INIT] Configuring remote for push..."
            cd "$REPO_DIR"
            git remote set-url origin "$HTTPS_URL"

            echo "[INIT] Verifying remote..."
            git remote get-url origin | sed 's/x-access-token:.*@/x-access-token:***@/'
            git rev-parse HEAD

            echo "[INIT] Configuring git identity..."
            git config user.name "zen-brain1"
            git config user.email "zen-brain1@kube-zen.io"

            echo "[INIT] ✅ Repo ready: $(git rev-parse --short HEAD)"
        volumeMounts:
        - name: repo-storage
          mountPath: /workspace/repo
        - name: git-push-credentials
          mountPath: /git-auth
          readOnly: true
      containers:
      - name: factory-fill
        image: zen-registry:5000/zen-brain-factory-fill:latest
        imagePullPolicy: Never
        env:
        - name: REPO_ROOT
          value: "/workspace"
        - name: ZEN_EXECUTION_REPO
          value: "/workspace/repo"
        - name: ZEN_WORKTREE_BASE
          value: "/workspace/worktrees"
        - name: ZEN_RESULTS_DIR
          value: "/workspace/results"
        - name: ZEN_GIT_REMOTE
          value: "origin"
        - name: ZEN_GIT_PUSH_ENABLED
          value: "true"
        - name: ZEN_GIT_AUTHOR_NAME
          value: "zen-brain1"
        - name: ZEN_GIT_AUTHOR_EMAIL
          value: "zen-brain1@kube-zen.io"
        - name: ARTIFACT_ROOT
          value: "/artifacts"
        - name: EVIDENCE_ROOT
          value: "/evidence"
        - name: METRICS_DIR
          value: "/metrics"
        - name: L1_ENDPOINT
          value: "http://host.k3d.internal:56227"
        - name: L2_ENDPOINT
          value: "http://host.k3d.internal:60509"
        - name: L1_MODEL
          value: "Qwen3.5-0.8B-Q4_K_M.gguf"
        # Adaptive concurrency (R035–R041)
        - name: CONCURRENCY_TOTAL_SLOTS
          value: "10"
        - name: CONCURRENCY_RESERVED_SLOTS
          value: "2"
        - name: FACTORY_POLL_INTERVAL
          value: "30s"
        - name: MAX_DISPATCH
          value: "8"
        - name: TIMEOUT_SEC
          value: "300"
        - name: RESULT_DIR
          value: "/workspace/results"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # Jira credentials from ZenLock-decrypted secret
        envFrom:
        - secretRef:
            name: jira-credentials-runtime
        volumeMounts:
        - name: repo-storage
          mountPath: /workspace/repo
        - name: git-push-credentials
          mountPath: /git-auth
          readOnly: true
        - name: artifacts
          mountPath: /artifacts
        - name: evidence
          mountPath: /evidence
        - name: metrics
          mountPath: /metrics
        - name: results
          mountPath: /workspace/results
        - name: worktrees
          mountPath: /workspace/worktrees
        - name: templates
          mountPath: /config/templates
          readOnly: true
        # Readiness probe: verify repo + git push auth are available
        readinessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - |
                test -d /workspace/repo/.git && \
                test -f /git-auth/github-token && \
                cd /workspace/repo && git rev-parse HEAD >/dev/null 2>&1 && \
                git ls-remote --exit-code origin HEAD >/dev/null 2>&1
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 3
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
      volumes:
      - name: repo-storage
        persistentVolumeClaim:
          claimName: zen-brain-repo
      - name: git-push-credentials
        secret:
          secretName: git-push-credentials
      - name: artifacts
        emptyDir: {}
      - name: evidence
        emptyDir: {}
      - name: metrics
        emptyDir: {}
      - name: results
        emptyDir: {}
      - name: worktrees
        emptyDir: {}
      - name: templates
        configMap:
          name: task-templates

---
# Roadmap Items ConfigMap mount for scheduler
# This allows roadmap-steward to read ROADMAP_ITEMS.md
apiVersion: v1
kind: ConfigMap
metadata:
  name: roadmap-items
  namespace: zen-brain
data:
  ROADMAP_ITEMS.md: |
    # Roadmap Items
    This file tracks planned work that roadmap-steward will create Jira tickets for.
    
    ## Active
    - [ ] Deploy zen-brain1 apiserver for REST/GraphQL interface
    - [ ] Configure KB/QMD ingestion from zen-docs
    - [ ] Set up ReMe checkpoint directories
    - [ ] Deploy foreman K8s operator
    
    ## Backlog
    - [ ] Migrate zen-brain1 to production cluster
    - [ ] Set up CockroachDB backups
    - [ ] Configure monitoring/alerting
    - [ ] Document operational runbooks
