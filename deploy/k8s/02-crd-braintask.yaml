# BrainTask CRD — minimal schema for first K8s-managed slice
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: braintasks.zen.kube-zen.io
spec:
  group: zen.kube-zen.io
  names:
    kind: BrainTask
    listKind: BrainTaskList
    plural: braintasks
    singular: braintask
    shortNames: [bt, btask]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [taskId, workType]
            properties:
              taskId:
                type: string
                description: "Jira issue key or internal task ID"
              sessionId:
                type: string
                description: "Session this task belongs to"
              workItemKey:
                type: string
                description: "External work item reference (Jira key)"
              workType:
                type: string
                enum: [implementation, bug, feature, refactoring, test, documentation, scheduled-batch]
              priority:
                type: integer
                default: 0
              objective:
                type: string
                description: "Task objective/description"
              template:
                type: string
                description: "Task template name"
              assignedTo:
                type: string
                description: "Worker assignment (pod name)"
          status:
            type: object
            properties:
              phase:
                type: string
                enum: [Pending, Assigned, Running, Completed, Failed, Retrying]
              message:
                type: string
              startTime:
                type: string
                format: date-time
              completionTime:
                type: string
                format: date-time
              proofOfWorkRef:
                type: string
                description: "Reference to proof-of-work artifact (configmap)"
    subresources:
      status: {}
