# Zen-Brain core. Values driven by config/clusters.yaml (generated) + deploy/values/<env>/zen-brain.yaml

image:
  repository: zen-registry:5000/zen-brain
  tag: mlq-enabled
  pullPolicy: IfNotPresent

# ⛔ Ollama is DEPRECATED and FORBIDDEN for zen-brain1.
# Primary inference uses llama.cpp (L1/L2). Do NOT configure Ollama.
# The ollama block has been removed. If present, it will be ignored.

apiserver:
  port: 8080
  service:
    type: ClusterIP
    externalPort: 8080
  # zen-glm: when set, ZEN_GLM_API_KEY is injected from this secret (key: api-key). Secret must exist; create from runtime env only.
  zenGlmSecretName: ""
  env:
    - name: ZEN_RUNTIME_PROFILE
      value: dev
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "200m"

foreman:
  workerCount: 5  # Number of parallel workers (pilot default: 5)
  # LLM configuration for Factory execution (ZB-024: qwen3.5:0.8b, 45min timeout)
  # Ollama is DEPRECATED and FORBIDDEN. Using llama.cpp L1 endpoint.
  enableFactoryLLM: true
  llmBaseURL: "" # DEPRECATED: Do NOT set. Use L1_ENDPOINT for llama.cpp.
  llmModel: "qwen3.5:0.8b"
  llmTimeoutSeconds: 2700
  llmEnableThinking: false
  env:
    - name: ZEN_RUNTIME_PROFILE
      value: dev
    - name: ZEN_FOREMAN_ENABLE_LLM
      value: "true"
    # DEPRECATED: ZEN_FOREMAN_LLM_BASE_URL should not be set (Ollama forbidden)
    # - name: ZEN_FOREMAN_LLM_BASE_URL
    #   value: "http://host.k3d.internal:11434"
    - name: ZEN_FOREMAN_LLM_PROVIDER
      value: "llama.cpp"
    - name: L1_ENDPOINT
      value: "http://host.k3d.internal:56227"
    - name: L2_ENDPOINT
      value: "http://host.k3d.internal:60509"
    - name: ZEN_FOREMAN_LLM_MODEL
      value: "qwen3.5:0.8b"
    - name: ZEN_FOREMAN_LLM_TIMEOUT_SECONDS
      value: "2700"
    - name: ZEN_FOREMAN_LLM_ENABLE_THINKING
      value: "false"
  # Optional: Zen-Lock Jira credentials injection
  jiraZenLock:
    enabled: false
    secretName: "jira-credentials"
    mountPath: "/zen-lock/secrets"
  # Jira integration metadata (non-secret, source-controlled)
  jira:
    enabled: false
    url: "https://zen-mesh.atlassian.net"
    email: "zen@zen-mesh.io"
    projectKey: "ZB"
    credentialsDir: "/zen-lock/secrets"
    allowEnvFallback: false
    # Status mapping: Jira -> BrainTask
    statusMapping:
      "To Do": "requested"
      "In Progress": "running"
      "Done": "completed"
      "Blocked": "blocked"
    # Work type mapping: Jira -> BrainTask
    worktypeMapping:
      "Bug": "debug"
      "Task": "implementation"
      "Story": "design"
      "Epic": "research"
    # Priority mapping: Jira -> BrainTask
    priorityMapping:
      "Highest": "critical"
      "High": "high"
      "Medium": "medium"
      "Low": "low"
      "Lowest": "background"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"
