# Zen-Brain core. Values driven by config/clusters.yaml (generated) + deploy/values/<env>/zen-brain.yaml

image:
  repository: zen-registry:5000/zen-brain
  tag: dev
  pullPolicy: IfNotPresent

# Ollama deployment model:
# - Dev/sandbox default: Host Docker Ollama (http://host.k3d.internal:11434)
# - In-cluster Ollama (http://ollama:11434): Optional, legacy, experimental
# - See deploy/README.md for Ollama deployment model policy
ollama:
  baseUrl: ""       # Default for dev/sandbox: http://host.k3d.internal:11434
                      # In-cluster: http://ollama:11434 (optional/legacy/experimental)
  timeoutSeconds: 1200 # local-worker/Ollama HTTP timeout; sandbox (CPU-only) can need 10–20min for first reply
  keepAlive: "30m"    # OLLAMA_KEEP_ALIVE: how long to keep model resident after preload/verify ("30m", "-1" = indefinite)

apiserver:
  port: 8080
  service:
    type: ClusterIP
    externalPort: 8080
  # zen-glm: when set, ZEN_GLM_API_KEY is injected from this secret (key: api-key). Secret must exist; create from runtime env only.
  zenGlmSecretName: ""
  env:
    - name: ZEN_RUNTIME_PROFILE
      value: dev
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "200m"

foreman:
  env:
    - name: ZEN_RUNTIME_PROFILE
      value: dev
    - name: ZEN_FOREMAN_ENABLE_LLM
      value: "true"
    - name: ZEN_FOREMAN_LLM_BASE_URL
      value: "http://host.k3d.internal:11434"
    - name: ZEN_FOREMAN_LLM_MODEL
      value: "qwen3.5:0.8b"
    - name: ZEN_FOREMAN_LLM_TIMEOUT_SECONDS
      value: "2700"
    - name: ZEN_FOREMAN_LLM_ENABLE_THINKING
      value: "false"
  # Optional: Zen-Lock Jira credentials injection
  jiraZenLock:
    enabled: false
    secretName: "jira-credentials"
    mountPath: "/zen-lock/secrets"
  # Jira integration metadata (non-secret, source-controlled)
  jira:
    enabled: false
    url: "https://zen-mesh.atlassian.net"
    email: "zen@zen-mesh.io"
    projectKey: "ZB"
    credentialsDir: "/zen-lock/secrets"
    allowEnvFallback: false
    # Status mapping: Jira -> BrainTask
    statusMapping:
      "To Do": "requested"
      "In Progress": "running"
      "Done": "completed"
      "Blocked": "blocked"
    # Work type mapping: Jira -> BrainTask
    worktypeMapping:
      "Bug": "debug"
      "Task": "implementation"
      "Story": "design"
      "Epic": "research"
    # Priority mapping: Jira -> BrainTask
    priorityMapping:
      "Highest": "critical"
      "High": "high"
      "Medium": "medium"
      "Low": "low"
      "Lowest": "background"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"
