---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apiserver
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: apiserver
    app.kubernetes.io/part-of: zen-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apiserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apiserver
        app.kubernetes.io/part-of: zen-brain
    spec:
      containers:
        - name: apiserver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/apiserver"]
          env:
            - name: API_SERVER_PORT
              value: "{{ .Values.apiserver.port | default "8080" }}"
            {{- if .Values.ollama.baseUrl }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.baseUrl | quote }}
            {{- end }}
            {{- if .Values.ollama.timeoutSeconds }}
            - name: OLLAMA_TIMEOUT_SECONDS
              value: {{ .Values.ollama.timeoutSeconds | quote }}
            {{- end }}
            {{- if .Values.ollama.keepAlive }}
            - name: OLLAMA_KEEP_ALIVE
              value: {{ .Values.ollama.keepAlive | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.apiserver.port | default 8080 }}
          resources:
            {{- toYaml .Values.apiserver.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: apiserver
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: apiserver
    app.kubernetes.io/part-of: zen-brain
spec:
  type: {{ .Values.apiserver.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ .Values.apiserver.service.externalPort | default .Values.apiserver.port | default 8080 }}
      targetPort: {{ .Values.apiserver.port | default 8080 }}
  selector:
    app.kubernetes.io/name: apiserver
