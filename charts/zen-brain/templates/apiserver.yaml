---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apiserver
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: apiserver
    app.kubernetes.io/part-of: zen-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apiserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apiserver
        app.kubernetes.io/part-of: zen-brain
    spec:
      containers:
        - name: apiserver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/apiserver"]
          env:
            - name: API_SERVER_PORT
              value: "{{ .Values.apiserver.port | default "8080" }}"
            {{- range .Values.apiserver.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{/* DEPRECATED: Ollama env vars removed. Ollama is forbidden for zen-brain1. */}}
            {{- if .Values.apiserver.zenGlmSecretName }}
            - name: ZEN_GLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiserver.zenGlmSecretName | quote }}
                  key: api-key
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.apiserver.port | default 8080 }}
          resources:
            {{- toYaml .Values.apiserver.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: apiserver
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: apiserver
    app.kubernetes.io/part-of: zen-brain
spec:
  type: {{ .Values.apiserver.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ .Values.apiserver.service.externalPort | default .Values.apiserver.port | default 8080 }}
      targetPort: {{ .Values.apiserver.port | default 8080 }}
  selector:
    app.kubernetes.io/name: apiserver
