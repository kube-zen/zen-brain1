---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: foreman
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: foreman
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
rules:
  - apiGroups: ["zen.kube-zen.com"]
    resources: ["braintasks", "braintasks/status", "brainqueues", "brainqueues/status", "brainagents", "brainagents/status", "brainpolicies", "brainpolicies/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: foreman
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: foreman
subjects:
  - kind: ServiceAccount
    name: foreman
    namespace: zen-brain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foreman
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: foreman
  template:
    metadata:
      labels:
        app.kubernetes.io/name: foreman
        app.kubernetes.io/part-of: zen-brain
      {{- if .Values.foreman.jiraZenLock.enabled }}
      annotations:
        zen-lock/inject: "{{ .Values.foreman.jiraZenLock.secretName }}"
        zen-lock/mount-path: "{{ .Values.foreman.jiraZenLock.mountPath }}"
      {{- end }}
    spec:
      serviceAccountName: foreman
      {{- if .Values.foreman.jira.enabled }}
      volumes:
        - name: config-volume
          configMap:
            name: foreman-config
      {{- end }}
      containers:
        - name: foreman
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/foreman"]
          args:
            - "-metrics-bind-address=:8080"
            - "-health-probe-bind-address=:8081"
            - "-workers={{ .Values.foreman.workerCount }}"
          env:
            - name: ZEN_FOREMAN_RUNTIME_DIR
              value: "/tmp/zen-brain-factory"
            - name: ZEN_FOREMAN_WORKSPACE_HOME
              value: "/tmp/zen-brain-factory"
            - name: ZEN_BRAIN_RUNTIME_DIR
              value: "/tmp/zen-brain-factory"
            {{- if .Values.foreman.jiraZenLock.enabled }}
            - name: ZEN_FOREMAN_JIRA_CREDENTIALS
              value: "{{ .Values.foreman.jiraZenLock.secretName | quote }}"
            {{- end }}
            {{- range .Values.foreman.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          resources:
              {{- toYaml .Values.foreman.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- if .Values.foreman.jira.enabled }}
          volumeMounts:
            - name: config-volume
              mountPath: /home/zenuser/.zen-brain/config.yaml
              subPath: config.yaml
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: foreman
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
    - name: health
      port: 8081
      targetPort: 8081
  selector:
    app.kubernetes.io/name: foreman
---
{{- if .Values.foreman.jira.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: foreman-config
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
data:
  config.yaml: |
    jira:
      enabled: true
      base_url: "{{ .Values.foreman.jira.url }}"
      email: "{{ .Values.foreman.jira.email }}"
      project_key: "{{ .Values.foreman.jira.projectKey }}"
      credentials_dir: "{{ .Values.foreman.jira.credentialsDir }}"
      allow_env_fallback: {{ .Values.foreman.jira.allowEnvFallback }}
      status_mapping:
{{ toYaml .Values.foreman.jira.statusMapping | indent 8 }}
      worktype_mapping:
{{ toYaml .Values.foreman.jira.worktypeMapping | indent 8 }}
      priority_mapping:
{{ toYaml .Values.foreman.jira.priorityMapping | indent 8 }}
{{- end }}
