---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: foreman
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: foreman
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
rules:
  - apiGroups: ["zen.kube-zen.com"]
    resources: ["braintasks", "braintasks/status", "brainqueues", "brainqueues/status", "brainagents", "brainagents/status", "brainpolicies", "brainpolicies/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: foreman
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: foreman
subjects:
  - kind: ServiceAccount
    name: foreman
    namespace: zen-brain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foreman
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: foreman
  template:
    metadata:
      labels:
        app.kubernetes.io/name: foreman
        app.kubernetes.io/part-of: zen-brain
    spec:
      serviceAccountName: foreman
      containers:
        - name: foreman
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/foreman"]
          args:
            - "-metrics-bind-address=:8080"
            - "-health-probe-bind-address=:8081"
            - "-workers=2"
          env:
            - name: ZEN_FOREMAN_RUNTIME_DIR
              value: "/tmp/zen-brain-factory"
            - name: ZEN_FOREMAN_WORKSPACE_HOME
              value: "/tmp/zen-brain-factory"
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          resources:
            {{- toYaml .Values.foreman.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: foreman
  namespace: zen-brain
  labels:
    app.kubernetes.io/name: foreman
    app.kubernetes.io/part-of: zen-brain
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
    - name: health
      port: 8081
      targetPort: 8081
  selector:
    app.kubernetes.io/name: foreman
