# DEPRECATED (2026-03-26): This chart is for optional in-cluster Ollama. Primary runtime is llama.cpp (L1/L2). Ollama is L0 fallback via host Docker only. See docs/03-DESIGN/LOCAL_LLM_ESCALATION_LADDER.md.

{{- if and .Values.enabled (len .Values.models) -}}
# Post-install/post-upgrade Job: wait for Ollama then pull each model via API (idempotent).
# No manual kubectl exec ... ollama pull in the standard path.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-preload-{{ .Release.Revision }}
  namespace: zen-brain
  labels:
    app: ollama-preload
    app.kubernetes.io/part-of: zen-brain
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.preload.backoffLimit | default 10 }}
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: ollama-preload
    spec:
      restartPolicy: OnFailure
      containers:
        - name: preload
          image: {{ .Values.preload.image | default "curlimages/curl:latest" }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for Ollama..."
              until curl -sf http://ollama:{{ .Values.service.port | default 11434 }}/api/tags >/dev/null 2>&1; do sleep 5; done
              echo "Ollama ready; pulling models..."
              {{- range .Values.models }}
              echo "Pull {{ . }}..."
              curl -sSf -X POST http://ollama:{{ $.Values.service.port | default 11434 }}/api/pull -d "{\"name\":\"{{ . }}\"}" || true
              {{- end }}
              echo "Preload done."
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
{{- end }}
