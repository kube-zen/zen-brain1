# ZenContext development dependencies
# Redis (Tier 1) + MinIO S3 (Tier 3)
version: '3.8'

services:
  # Redis for Tier 1 (hot memory)
  redis:
    image: redis:7-alpine
    container_name: zen-brain-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # MinIO for Tier 3 (cold archival) - S3 compatible
  minio:
    image: minio/minio:latest
    container_name: zen-brain-minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_REGION: us-east-1
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Create bucket automatically (depends on MinIO)
  create-bucket:
    image: minio/mc:latest
    container_name: zen-brain-create-bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/zen-brain-context --ignore-existing;
      mc anonymous set download myminio/zen-brain-context;
      echo 'Bucket zen-brain-context created and set to public download';
      "
    networks:
      - default

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: zen-brain-network